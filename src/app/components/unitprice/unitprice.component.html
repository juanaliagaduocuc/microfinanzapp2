<ion-header>
  <ion-toolbar>
    <ion-title>
      Calculadora Unidad/Precio
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-card>
          <ion-card-header>
            <ion-card-title>
              <ion-list>
                <ion-item>
                  <ion-select label="Unidad de Medida" placeholder="Unidad" [(ngModel)]="medida">
                    <ion-select-option value="Gramos">Gramos</ion-select-option>
                    <ion-select-option value="Mililitros">Mililitros</ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-list>
            </ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-card>
          <ion-card-header>
            <ion-card-title>
              Opcion A
            </ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <ion-label>{{medida}}</ion-label>
            <ion-input
              type="number"
              clearOnEdit="true"
              [(ngModel)]="unidadA"
              (ionInput)="resultadoA(); comparar()">
            </ion-input>
            <ion-label>Precio</ion-label>
            <ion-input
              type="number"
              clearOnEdit="true"
              [(ngModel)]="precioA"
              (ionInput)="resultadoA(); comparar()">
            </ion-input>
            <ion-label>Precio/Unidad</ion-label>
            <ion-input
              disabled
              [(ngModel)]="valorA">
            </ion-input>
          </ion-card-content>
        </ion-card>
      </ion-col>
      <ion-col>
        <ion-card>
          <ion-card-header>
            <ion-card-title>
              Opcion B
            </ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <ion-label>{{medida}}</ion-label>
            <ion-input
              type="number"
              clearOnEdit="true"
              [(ngModel)]="unidadB"
              (ionInput)="resultadoB(); comparar()">
            </ion-input>
            <ion-label>Precio</ion-label>
            <ion-input
              type="number"
              clearOnEdit="true"
              [(ngModel)]="precioB"
              (ionInput)="resultadoB(); comparar()">
            </ion-input>
            <ion-label>Precio/Unidad</ion-label>
            <ion-input
              disabled
              [(ngModel)]="valorB">
            </ion-input>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-card>
          <ion-card-content>
            <ion-list>
              <ion-item>
                <ion-input disabled
                  [(ngModel)]="explicacion">
                </ion-input>
              </ion-item>
              <ion-item>
                <ion-input disabled 
                  [(ngModel)]="diferencia">
                </ion-input>
              </ion-item>
            </ion-list>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
